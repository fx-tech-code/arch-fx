# Include global-theme settings
include=~/.config/global-theme/foot

# ─────────────────────────────────────────────
# General
# ─────────────────────────────────────────────
dpi-aware=yes

# ─────────────────────────────────────────────
# Font
# ─────────────────────────────────────────────
font=monospace:size=12
#font=JetBrainsMono Nerd Font:size=11
#font-bold=JetBrainsMono Nerd Font:style=Bold:size=11
#font-italic=JetBrainsMono Nerd Font:style=Italic:size=11
#font-bold-italic=JetBrainsMono Nerd Font:style=Bold Italic:size=11

# Slightly increased line height for readability
line-height=18

# ─────────────────────────────────────────────
# Window
# ─────────────────────────────────────────────
pad=8x8 center
resize-delay-ms=0

# Disable window decorations (Niri handles layout)
#title=

# ─────────────────────────────────────────────
# Cursor
# ─────────────────────────────────────────────
#cursor-style=beam
#cursor-blink=yes

# ─────────────────────────────────────────────
# Scrollback
# ─────────────────────────────────────────────
#scrollback-lines=10000

# ─────────────────────────────────────────────
# Keybindings (minimal overrides)
# ─────────────────────────────────────────────
[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
search-start=Control+Shift+f