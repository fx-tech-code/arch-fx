source = /home/fx/.config/colorizer/current/hyprlock.colorizer


$font = JetBrains Mono
$label-font = JetBrains Mono
$nerd-font = JetBrains Mono Nerd

general {
    hide_cursor = true
    grace = 0
}

animations {
    enabled = false
}

# BACKGROUND
background {
    monitor =
    color = $background_color
    blur_passes = 0
}

# LOCK ICON
#label {
#    monitor =
#    text = <span>  </span>
#    font_size = 96
#    font_family = $nerd-font
#    color = $text_color
#    #nerd-icon needs some tweaking to be properly centered
#    position = -16, 200
#    halign = center
#    valign = center
#}

# GREETING
label {
    monitor =
    text = Hello, $USER!
    font_size = 18
    font_family = $label-font
    color = $text_color
    position = 0, 30
    halign = center
    valign = center
}

# PASSWORD FIELD
input-field {
    monitor =
    size = 240, 46
    outline_thickness = 2
    inner_color = rgba(0, 0, 0, 0.0)
    outer_color = $border_color
    font_color = $text_color
    check_color = $border_color
    fail_color = rgba(220, 80, 80, 1.0)
    rounding = 0

    font_family = $font
    fade_on_empty = false
    placeholder_text = 
    fail_text = auth failed
    dots_spacing = 0.25

    position = 0, -35
    halign = center
    valign = center
}