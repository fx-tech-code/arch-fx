# Include global-theme settings
include=~/.config/colorizer/current/fuzzel.colorizer

[main]
font=Adwaita Mono:size=12
line-height=36
image-size-ratio=1
icons-enabled=yes
lines=10
horizontal-pad=40
vertical-pad=20
inner-pad=10
width=50
prompt=""
cache=/dev/null
terminal=foot -e

[border]
width=2
radius=0

[key-bindings]
next=Control+n
next-with-wrap=Down
prev=Control+p
prev-with-wrap=Up